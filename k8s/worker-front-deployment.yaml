# =============================================================================
# worker-front Deployment（雛形 / リファレンス）
#
# 注意: 本番の Deployment / Service / Ingress は外部の K8S_REPO 管理。
#       このファイルは「3-tier をどう足すか」の参照テンプレート。
#
# 設計（3-tier: web / worker-front / compute）:
#   - 全 pod「同一イメージ」。役割は COMPONENT_ROLE で起動時に確定する。
#   - worker-front は COMPONENT_ROLE=worker-front:
#       * /api/v1/generate・/api/v1/post・/api/v1/ingest/*・/api/v1/calendar/collage/* を HTTP 配信
#         （collage は compute 描画＋S3読み＋Fediverse投稿を伴うため web ではなく worker-front）
#       * instrumentation.ts が Graphile Worker ランナー（キュー consumer）を起動
#       * 重い画像処理は compute サービス（/api/internal/*）へ委譲（自身は sharp/skia を呼ばない）
#   - レート制限（generate の IP単位8s/1req インメモリ）のため当面 replicas: 1。
#   - Traefik で generate/post/ingest/calendar/collage を worker-front へ、それ以外を web へ振り分ける（末尾の例参照）。
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movapic-neo-worker-front
  labels:
    app: movapic-neo
    component: worker-front
spec:
  replicas: 1 # generate の in-memory レート制限のため当面 1 固定
  selector:
    matchLabels:
      app: movapic-neo
      component: worker-front
  template:
    metadata:
      labels:
        app: movapic-neo
        component: worker-front
    spec:
      containers:
        - name: worker-front
          image: ghcr.io/highemerly/movapic-neo:latest # CIがタグ更新（全tier同一イメージ）
          ports:
            - containerPort: 3000
          env:
            - name: COMPONENT_ROLE
              value: "worker-front"
            - name: WORKER_CONCURRENCY
              value: "3"
            # compute サービスへの内部呼び出し先（ClusterIP）。
            - name: COMPUTE_SERVICE_URL
              value: "http://movapic-neo-compute"
          # DATABASE_URL / S3 資格情報 / 暗号化キー / NEXT_PUBLIC_APP_URL /
          # MASTODON_BOT_*（botリプライ用）/ COMPUTE_API_KEY など、web と同じ env を共有する。
          envFrom:
            - secretRef:
                name: movapic-neo-secret
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            # 画像処理は compute に委譲したため web 並みで足りる（I/O中心）。
            limits:
              cpu: "1"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: movapic-neo-worker-front
  labels:
    app: movapic-neo
    component: worker-front
spec:
  selector:
    app: movapic-neo
    component: worker-front
  ports:
    - port: 80
      targetPort: 3000
