# =============================================================================
# compute Deployment（雛形 / リファレンス）
#
# 注意: 本番の Deployment / Service / NetworkPolicy は外部の K8S_REPO 管理。
#       このファイルは参照テンプレート。
#
# 設計（3-tier の compute = 画像生成専用・ステートレス）:
#   - 全 pod「同一イメージ」。COMPONENT_ROLE=compute で起動時に役割を確定。
#     middleware が /api/internal/* と /api/health 以外を 404 にする（多層防御）。
#   - 外部 Ingress を持たない（ClusterIP のみ）。worker-front からのみ NetworkPolicy で許可。
#   - 秘密情報を一切持たない: DB/R2/Fediverse/JWT の env は渡さず、COMPUTE_API_KEY のみ。
#   - 画像処理（libvips/skia）のため CPU/メモリは厚め。負荷に応じて replicas を増やす。
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movapic-neo-compute
  labels:
    app: movapic-neo
    component: compute
spec:
  replicas: 2 # スケールさせたい場合はここを増やす
  selector:
    matchLabels:
      app: movapic-neo
      component: compute
  template:
    metadata:
      labels:
        app: movapic-neo
        component: compute
    spec:
      containers:
        - name: compute
          image: ghcr.io/highemerly/movapic-neo:latest # CIがタグ更新（全tier同一イメージ）
          ports:
            - containerPort: 3000
          # ★最小 env のみ（envFrom で全 secret を流し込まない＝秘密情報を持たせない）。
          env:
            - name: COMPONENT_ROLE
              value: "compute"
            - name: PORT
              value: "3000"
            # worker-front との共有鍵だけは必要。secret から該当キーのみ取り込む。
            - name: COMPUTE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: movapic-neo-secret
                  key: COMPUTE_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            # 画像処理（libvips/skia）のピークに合わせて厚めに確保。
            limits:
              cpu: "2"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: movapic-neo-compute
  labels:
    app: movapic-neo
    component: compute
spec:
  type: ClusterIP # 外部公開しない
  selector:
    app: movapic-neo
    component: compute
  ports:
    - port: 80
      targetPort: 3000
---
# compute への ingress は worker-front pod からのみ許可する（多層防御）。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: movapic-neo-compute-allow-worker-front
  labels:
    app: movapic-neo
    component: compute
spec:
  podSelector:
    matchLabels:
      app: movapic-neo
      component: compute
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: movapic-neo
              component: worker-front
      ports:
        - protocol: TCP
          port: 3000
