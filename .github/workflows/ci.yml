name: CI

# テストゲート。全ブランチへの push で checks.yml（vitest / eslint / tsc）を回す。
# タグ push（リリース）は branches フィルタに一致しないためここでは発動せず、
# docker-build.yml 側が同じ checks.yml をビルドと並走させる（＝二重実行しない）。
on:
  push:
    branches:
      - '**'

# 同一ブランチ/PR の古い実行はキャンセルして CI 分を節約する。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
