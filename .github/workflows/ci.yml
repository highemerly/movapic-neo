name: CI

# テストゲート。PR と main への push で checks.yml（vitest / eslint / tsc）を回す。
# リリース（タグ push での Docker ビルド）は docker-build.yml が同じ checks.yml を並走させる。
on:
  pull_request:
  push:
    branches:
      - main

# 同一ブランチ/PR の古い実行はキャンセルして CI 分を節約する。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
