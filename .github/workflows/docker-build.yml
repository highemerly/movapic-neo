name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_REPO: highemerly/k8sg1-repo
  # web / worker-front / compute は同一イメージ・同一タグ。3マニフェストを更新する（スペース区切り）。
  K8S_MANIFEST_PATHS: "manifests/movapic-neo/prd/web.yaml manifests/movapic-neo/prd/worker.yaml manifests/movapic-neo/prd/compute.yaml"

jobs:
  # CI（vitest / eslint / tsc）。build-and-push と並走し、両方緑になって初めて
  # create-k8s-pr が走る（下の needs 参照）。定義は checks.yml に集約。
  checks:
    uses: ./.github/workflows/checks.yml

  # ゴールデン画像テスト（skia 実描画の見た目回帰）。本番同一ランタイムの golden-test ステージを
  # build して docker run で比較する。build-and-push と並走し、退行があれば create-k8s-pr を止める。
  golden:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout fonts (private repository)
        uses: actions/checkout@v4
        with:
          repository: highemerly/movapic-fonts
          token: ${{ secrets.FONT_REPO_TOKEN }}
          path: fonts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 本番イメージと同じ deps/prisma レイヤを共有するので、build-and-push が積む
      # buildcache を再利用してソースビルド（sharp 等）をスキップできる。
      - name: Build golden-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: golden-test
          load: true
          tags: movapic-golden:ci
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          platforms: linux/amd64

      - name: Run golden image tests
        run: |
          mkdir -p golden-out
          docker run --rm -e GOLDEN_DIFF_DIR=/out -v "$PWD/golden-out:/out" movapic-golden:ci

      # 失敗時のみ actual/expected/diff PNG をアーティファクト化（目視用）。
      - name: Upload golden diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs
          path: golden-out
          if-no-files-found: ignore

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      has_migration: ${{ steps.migration.outputs.has_migration }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout fonts (private repository)
        uses: actions/checkout@v4
        with:
          repository: highemerly/movapic-fonts
          token: ${{ secrets.FONT_REPO_TOKEN }}
          path: fonts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Check for migration changes
        id: migration
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            if git diff --name-only "$PREV_TAG" HEAD | grep -q "^prisma/migrations/"; then
              echo "has_migration=true" >> $GITHUB_OUTPUT
              echo "Migration files changed since $PREV_TAG"
            else
              echo "has_migration=false" >> $GITHUB_OUTPUT
              echo "No migration changes since $PREV_TAG"
            fi
          else
            echo "has_migration=false" >> $GITHUB_OUTPUT
            echo "No previous tag found"
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # BuildKit の --mount=type=cache（.next/cache・npm）は type=gha では永続化されないため、
      # actions/cache 経由でラウンドトリップさせて Next.js のビルドを差分化する
      - name: Restore build cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3.1.0
        with:
          cache-map: |
            {
              "var-cache-npm": "/root/.npm",
              "var-cache-next": "/app/.next/cache"
            }
          skip-extraction: false

      - name: Build and push Docker image (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true,compression=zstd,compression-level=3
          platforms: linux/amd64

  create-k8s-pr:
    # ビルド・CI・ゴールデン画像テストが全て成功したときだけ k8s マニフェストへ PR する。
    needs: [build-and-push, checks, golden]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout k8s repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_REPO }}
          token: ${{ secrets.K8SG1_PAT }}
          path: k8s-repo

      - name: Update image tag
        run: |
          cd k8s-repo
          for p in ${{ env.K8S_MANIFEST_PATHS }}; do
            sed -i "s|image: ghcr.io/highemerly/movapic-neo:.*|image: ghcr.io/highemerly/movapic-neo:${{ needs.build-and-push.outputs.version }}|" "$p"
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          path: k8s-repo
          token: ${{ secrets.K8SG1_PAT }}
          branch: update-movapic-neo-${{ needs.build-and-push.outputs.version }}
          commit-message: "Update movapic-neo to ${{ needs.build-and-push.outputs.version }}"
          title: "Update movapic-neo to ${{ needs.build-and-push.outputs.version }}"
          body: |
            ## Changes
            - Update image: `ghcr.io/highemerly/movapic-neo:${{ needs.build-and-push.outputs.version }}`

            ## Migration
            ${{ needs.build-and-push.outputs.has_migration == 'true' && '⚠️ **このリリースにはDBマイグレーションが含まれます**' || '✅ マイグレーション不要' }}

            ${{ needs.build-and-push.outputs.has_migration == 'true' && '### マイグレーション実行手順' || '' }}
            ${{ needs.build-and-push.outputs.has_migration == 'true' && '```bash' || '' }}
            ${{ needs.build-and-push.outputs.has_migration == 'true' && 'kubectl port-forward -n shared-postgres-prd svc/postgres-rw 15432:5432' || '' }}
            ${{ needs.build-and-push.outputs.has_migration == 'true' && 'DATABASE_URL="postgresql://<username>:<password>@localhost:15432/movapic?sslmode=disable&schema=public" npx prisma migrate status' || '' }}
            ${{ needs.build-and-push.outputs.has_migration == 'true' && 'DATABASE_URL="postgresql://<username>:<password>@localhost:15432/movapic?sslmode=disable&schema=public" npx prisma migrate deploy' || '' }}
            ${{ needs.build-and-push.outputs.has_migration == 'true' && '```' || '' }}

            ---
            🤖 Auto-generated by GitHub Actions
          labels: |
            movapic-neo
            ${{ needs.build-and-push.outputs.has_migration == 'true' && 'requires-migration' || '' }}
